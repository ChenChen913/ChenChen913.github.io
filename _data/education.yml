zh:
  school: 青岛理工大学
  detail: 理学院 · 信息与计算科学专业 · 本科
  period: 2016.09 — 2020.06
  honors:
    - 专业成绩排名前 10%，通过英语六级（CET-6）
    - GPA 3.6 / 4.0
    - 高等数学类课程：数学分析上 99 分，大学物理上 90 分，离散数学 91 分
    - 计算机类课程：Java 高级程序设计 97 分，计算机网络 91 分，数据结构 95 分，C++ 程序设计 96 分，外部程序设计 94 分
