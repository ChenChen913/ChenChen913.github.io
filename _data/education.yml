    - 2018 年 5 月 美国大学生数学建模比赛 H 奖
    - 2018 年 5 月 第九届蓝桥杯全国软件和信息技术专业人才大赛省三等奖
    - 2017 年 10 月 青岛理工大学校长奖学金
    - 2018 年 10 月 青岛理工大学优秀学生奖学金
  courses_label: 核心主修课程
  courses:
    - 数学分析
    - 高等代数
    - 概率论与数理统计
    - 离散数学
    - 数据结构与算法
    - C++ 程序设计
    - Java 高级程序设计
    - 计算机网络
    - 数据库系统
    - 操作系统

