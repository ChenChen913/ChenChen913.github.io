<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF 查看器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #525659;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  #toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    background: #323639;
    color: #ccc;
    font-size: 13px;
    user-select: none;
    -webkit-user-select: none;
  }
  #toolbar button, #toolbar a.btn {
    background: #565a5e;
    color: #fff;
    border: none;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    text-decoration: none;
    white-space: nowrap;
  }
  #toolbar button:hover, #toolbar a.btn:hover { background: #6c7176; }
  #toolbar button:disabled { opacity: 0.4; cursor: default; }
  #toolbar span { margin: 0 4px; }
  #toolbar .spacer { flex: 1; }
  #pages {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  canvas {
    display: block;
    margin: 0 auto;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: #aaa;
    font-size: 14px;
    gap: 10px;
  }
  #progress-bar {
    width: 200px;
    height: 4px;
    background: #444;
    border-radius: 2px;
    overflow: hidden;
  }
  #progress-fill {
    width: 0%;
    height: 100%;
    background: #5a9fd4;
    border-radius: 2px;
    transition: width 0.3s;
  }
  #error {
    display: none;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: #f88;
    font-size: 14px;
    text-align: center;
    padding: 20px;
  }
  #error a { color: #8cf; }
</style>
</head>
<body>

<div id="toolbar">
  <button id="btn-prev" disabled>◀</button>
  <span id="page-num">—</span>
  <button id="btn-next" disabled>▶</button>
  <span class="spacer"></span>
  <button id="btn-zoomin" title="放大">＋</button>
  <button id="btn-zoomout" title="缩小">－</button>
  <a id="btn-download" class="btn" href="#" download>📥 下载</a>
  <a id="btn-fullscreen" class="btn" href="#" target="_blank">⛶ 全屏</a>
</div>

<div id="loading">
  <span id="loading-text">正在加载 PDF…</span>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>
<div id="error">
  <span>PDF 加载失败。<br><a href="#" id="error-link">点击此处直接打开</a></span>
</div>
<div id="pages"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

var params = new URLSearchParams(location.search);
var pdfUrl = params.get('file');
if (!pdfUrl) {
  document.getElementById('loading-text').textContent = '未指定 PDF 文件';
  document.getElementById('progress-bar').style.display = 'none';
} else {
  // 下载链接指向原始 PDF
  document.getElementById('btn-download').href = pdfUrl;
  // 全屏按钮打开当前查看器页面（而非原始 PDF），避免手机端触发下载弹窗
  document.getElementById('btn-fullscreen').href = location.href;
  document.getElementById('error-link').href = pdfUrl;
  init(pdfUrl);
}

var pdfDoc = null, pageNum = 1, totalPages = 0, scale = 1.2;

function init(url) {
  var fill = document.getElementById('progress-fill');
  var text = document.getElementById('loading-text');

  var task = pdfjsLib.getDocument({
    url: url,
    disableAutoFetch: true,   // 只按需拉取页面，大幅加快首屏
    disableStream: false,      // 启用流式加载，边下载边解析
  });

  // 显示下载进度
  task.onProgress = function(evt) {
    if (evt.total > 0) {
      var pct = Math.round(evt.loaded / evt.total * 100);
      fill.style.width = pct + '%';
      text.textContent = '正在加载 PDF… ' + pct + '%';
    }
  };

  task.promise.then(function(pdf) {
    pdfDoc = pdf;
    totalPages = pdf.numPages;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('btn-prev').disabled = true;
    document.getElementById('btn-next').disabled = totalPages <= 1;
    document.getElementById('page-num').textContent = '1 / ' + totalPages;
    autoScale();
    renderPage(1);
  }).catch(function(err) {
    console.error(err);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'flex';
  });
}

function autoScale() {
  var w = document.getElementById('pages').clientWidth;
  scale = Math.max(0.5, (w - 20) / 612);
}

function renderPage(num) {
  if (!pdfDoc) return;
  document.getElementById('page-num').textContent = num + ' / ' + totalPages;
  document.getElementById('btn-prev').disabled = num <= 1;
  document.getElementById('btn-next').disabled = num >= totalPages;
  document.getElementById('pages').innerHTML =
    '<div style="text-align:center;padding:40px;color:#aaa;">加载中…</div>';

  pdfDoc.getPage(num).then(function(page) {
    var viewport = page.getViewport({ scale: scale });
    var canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    var ctx = canvas.getContext('2d');
    document.getElementById('pages').innerHTML = '';
    document.getElementById('pages').appendChild(canvas);
    page.render({ canvasContext: ctx, viewport: viewport });
    pageNum = num;
  });
}

document.getElementById('btn-prev').onclick = function() {
  if (pageNum > 1) renderPage(pageNum - 1);
};
document.getElementById('btn-next').onclick = function() {
  if (pageNum < totalPages) renderPage(pageNum + 1);
};
document.getElementById('btn-zoomin').onclick = function() {
  scale = Math.min(3, scale + 0.2);
  renderPage(pageNum);
};
document.getElementById('btn-zoomout').onclick = function() {
  scale = Math.max(0.5, scale - 0.2);
  renderPage(pageNum);
};

// 响应容器尺寸变化（横竖屏、窗口缩放）
var _resizeTimer = null;
window.addEventListener('resize', function() {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(function() {
    autoScale();
    if (pdfDoc) renderPage(pageNum);
  }, 200);
});
</script>

</body>
</html>
